---
kind: Pod
apiVersion: v1
metadata:
  name: restapi-app
  labels:
    app: restapi
spec:
  containers:
  - name: restapi-app
    image: restapi
    imagePullPolicy: IfNotPresent
---
kind: Service
apiVersion: v1
metadata:
  name: restapi-service
spec:
  selector:
    app: restapi
  ports:
  # Default port used by the image
  - port: 8000
---
