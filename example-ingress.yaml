---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example-ingress
  annotations:
    spec.ingressClassName: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - http:
      paths:
      - pathType: Prefix
        path: "/foo"
        backend:
          service:
            name: foo-service
            port:
              number: 5678
      - pathType: Prefix
        path: "/bar"
        backend:
          service:
            name: bar-service
            port:
              number: 5678
      - pathType: Prefix
        path: /restapi(/|$)(.*)
        backend:
          service:
            name: restapi-service
            port:
              number: 8000
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: main-service
            port:
              number: 5678
---
